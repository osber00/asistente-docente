<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Asistente Virtual del Curso</title>
    <meta name="description" content="Plantilla de asistente virtual docente lista para desplegar en Netlify.">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="page-shell">
    <main class="workspace-layout">
      <aside class="sidebar-panel" aria-label="Resumen del curso">
        <div class="sidebar-brand">Asistente CECAR</div>

        <section class="assistant-card">
          <div class="assistant-meta">
            <p class="eyebrow">Asistente del curso</p>
            <h1 id="course-name">Cargando curso...</h1>
            <p class="meta-copy" id="teacher-name">Cargando docente...</p>
          </div>
        </section>

        <section class="sidebar-section">
          <div class="section-title-row">
            <h2>Consultas sugeridas</h2>
          </div>
          <div class="chip-grid" id="suggestion-chips"></div>
        </section>
      </aside>

      <section class="chat-shell" aria-label="Chat del asistente">
        <header class="chat-topbar">
          <div class="chat-identity">
            <div>
              <p class="eyebrow">Atención a estudiantes</p>
              <h2>Chat del curso</h2>
            </div>
          </div>
          <a class="text-link topbar-link" href="./config.html">Configurar plantilla</a>
        </header>

        <div class="chat-log-wrapper">
          <div class="day-divider"><span>Hoy</span></div>
          <div class="chat-log" id="chat-log" aria-live="polite"></div>
        </div>

        <form id="chat-form" class="chat-form">
          <label class="sr-only" for="message">Escribe tu pregunta</label>
          <div class="composer-shell">
            <textarea id="message" name="message" rows="3" maxlength="1000" placeholder="Escribe tu pregunta sobre el curso..." required></textarea>
            <button type="submit" id="send-button" class="send-button" aria-label="Enviar mensaje" title="Enviar mensaje">Enviar</button>
          </div>
          <div class="chat-form-footer">
            <p class="helper-text">`Enter` envía el mensaje. `Shift + Enter` agrega una nueva línea.</p>
            <span class="helper-pill">Respuestas basadas en el curso</span>
          </div>
        </form>
      </section>
    </main>

    <template id="message-template">
      <article class="message">
        <p class="message-role"></p>
        <div class="message-text"></div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
